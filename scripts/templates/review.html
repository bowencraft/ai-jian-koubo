<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剪口播 · 审核稿</title>
  <script src="/lib/compute_keeps.js"></script>
  <script src="/lib/review_timeline_view.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./review.css">
</head>

<body>
  <!-- Loading 遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-kicker">/ LIKETALKAI · CUT</div>
      <div class="loading-label" id="loadingLabel">正在加载数据...</div>
      <div class="loading-dot-row">
        <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
      </div>
      <div class="loading-progress-container"><div class="loading-progress-bar" id="loadingProgress"></div></div>
      <div class="loading-time" id="loadingTime">加载中</div>
      <div class="loading-estimate" id="loadingEstimate"></div>
    </div>
  </div>

  <!-- 顶栏 · 指挥台 -->
  <div class="topbar">
    <div class="tb-left">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="剪口播">
          <rect width="36" height="36" rx="9" fill="#F2EBDD"/>
          <g fill="#2540FF">
            <rect x="6"    y="14"   width="3" height="8"  rx="1.5"/>
            <rect x="10.5" y="10.5" width="3" height="15" rx="1.5"/>
            <rect x="23"   y="9"    width="3" height="18" rx="1.5"/>
            <rect x="27.5" y="12.5" width="3" height="11" rx="1.5"/>
          </g>
          <path d="M14 6 H22 L18 11 Z" fill="#FF7A4D"/>
          <rect x="17.1" y="7" width="1.8" height="22" rx="0.9" fill="#FF7A4D"/>
        </svg>
        <span class="brand-word">剪<em>口播</em></span>
      </div>
      <div class="file-meta">
        <div class="file-sub" id="fileSub">REVIEW <span class="dot">●</span> 加载中</div>
      </div>
    </div>
    <div class="tb-center">
      <button class="ghost-tight" onclick="seekRel(-5)" title="后退 5s">⏮</button>
      <button class="play-btn" onclick="togglePlay()" id="playBtn">▶ 播放</button>
      <button class="ghost-tight" onclick="seekRel(5)" title="前进 5s">⏭</button>
      <div class="tb-sep"></div>
      <select id="speed" onchange="setSpeed(parseFloat(this.value))">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <select id="silenceThreshold" onchange="applySilenceThreshold(parseFloat(this.value))" title="一键勾选逐字稿里 ≥ 此长度的气口/停顿为「删减」（红色），你还能手动改。">
        <option value="0.2" selected>气口 ≥ 0.2s</option>
        <option value="0.3">气口 ≥ 0.3s</option>
        <option value="0.5">气口 ≥ 0.5s</option>
        <option value="1.0">气口 ≥ 1.0s</option>
      </select>
      <span class="time-display"><span id="timeCur">00:00</span><span class="sep">/</span><span id="timeTot">00:00</span></span>
    </div>
    <div class="tb-right">
      <button class="ghost" onclick="location.href='/editor.html'" title="回到素材编辑页调整多轨时间线">素材编辑</button>
      <button class="ghost" onclick="saveDraft()" title="保存当前勾选状态到本地 review_draft.json">保存进度</button>
      <button class="ghost" onclick="exportDraft()" title="把当前进度下载为 JSON 文件">导出进度</button>
      <button class="ghost" onclick="document.getElementById('draftImport').click()" title="导入之前导出的进度 JSON">导入进度</button>
      <input id="draftImport" type="file" accept="application/json,.json" style="display:none" onchange="importDraftFile(event)">
      <div class="export-menu" id="exportMenu">
        <button class="primary export-trigger" onclick="toggleExportMenu(event)" aria-haspopup="true" aria-expanded="false">导出为...</button>
        <div class="export-options" role="menu" aria-label="导出选项">
          <button onclick="exportFCPXML()" role="menuitem">FCPXML</button>
          <button onclick="exportEditedAudio('96k')" role="menuitem">音频 MP3 96 kbps</button>
          <button onclick="exportEditedAudio('128k')" role="menuitem">音频 MP3 128 kbps</button>
          <button onclick="exportEditedAudio('192k')" role="menuitem">音频 MP3 192 kbps</button>
          <button onclick="exportEditedAudio('256k')" role="menuitem">音频 MP3 256 kbps</button>
          <button onclick="exportSRT()" role="menuitem">SRT 字幕</button>
        </div>
      </div>
      <div class="tb-sep"></div>
      <button class="danger" onclick="clearAll()" title="清空选择">清空</button>
    </div>
  </div>

  <!-- 主体 -->
  <div class="workspace">
    <div class="stage">
      <!-- 逐字稿（主编辑区） -->
      <div class="transcript-panel">
        <div class="transcript-card">
          <div class="transcript-head">
            <div class="num" aria-hidden="true">
              <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="7"    width="20" height="3" rx="1.5" fill="#2540FF"/>
                <rect x="4" y="14.5" width="24" height="3" rx="1.5" fill="#2540FF" opacity=".68"/>
                <rect x="4" y="22"   width="13" height="3" rx="1.5" fill="#2540FF" opacity=".42"/>
              </svg>
            </div>
            <h2>逐字稿 <span class="en">/ Transcript</span></h2>
            <div class="head-shortcuts">
              <div class="help-row">
                <span><kbd>单击</kbd> 去那听</span>
                <span><kbd>划过</kbd> 删 / 恢复</span>
                <span><kbd>点气口</kbd> 删</span>
              </div>
              <div class="help-row">
                <span><kbd>Space</kbd> 播放</span>
                <span><kbd>←→</kbd> ±1s</span>
                <span><kbd>⌘Z</kbd> 撤销</span>
              </div>
            </div>
          </div>
          <div class="transcript-scroll">
            <div class="content" id="content"></div>
          </div>
        </div>
      </div>

      <div class="resizer" id="resizer"></div>

      <!-- 右侧栏：视频 + 切割参数 -->
      <div class="side-panel">
        <!-- Video card -->
        <div class="card video-card">
          <div id="video-container">
            <video id="player" src="/video" preload="metadata"></video>
          </div>
        </div>

        <!-- Cut params card -->
        <div class="card">
          <div class="card-head">
            <span class="label">/ 气口剪辑</span>
          </div>
          <div class="knobs-body">
            <div class="knob">
              <div class="knob-head"><span>句头</span><b id="knob-padstart-val">2 帧</b></div>
              <div class="knob-hint">每句开头多留几帧再起声，避免吞字、接得太赶</div>
              <input type="range" id="knob-padstart" min="0" max="8" step="1" value="2">
            </div>
            <div class="knob">
              <div class="knob-head"><span>句尾</span><b id="knob-padend-val">2 帧</b></div>
              <div class="knob-hint">每句结尾多留几帧再收，避免话没说完就被切</div>
              <input type="range" id="knob-padend" min="0" max="8" step="1" value="2">
            </div>
            <div class="tightness">
              <div class="tightness-line">
                <span class="tt-end tt-tight">紧</span>
                <div class="tt-wedge"></div>
                <span class="tt-end tt-loose">松</span>
              </div>
              <div class="tightness-cap">往「紧」＝留白少、干脆利落　·　往「松」＝留白多、多留呼吸</div>
            </div>
          </div>
        </div>

        <!-- 快捷键已移到逐字稿标题栏右侧 -->

      </div>
    </div>

    <!-- 底部全宽时间线 -->
    <div class="timeline-dock">
      <div class="dock-resizer" id="dockResizer" title="拖动调整波形高度"></div>
      <div class="tl-status">
        <div class="wave-legend">
          <span class="wl wl-normal"><span class="sw" id="lg-normal"></span>正常</span>
          <span class="wl"><span class="sw" id="lg-del"></span>删减</span>
          <span class="wl"><span class="sw" id="lg-breath"></span>气口</span>
          <span class="wl" id="projectSummary"></span>
        </div>
        <span class="sstat">总时长 <b id="tl-total">--:--</b></span>
        <span class="sstat sstat-final">剪后 <b id="tl-final">--:--</b></span>
        <div class="tl-zoom">
          <div class="timeline-mode-switch" id="timelineModeSwitch" role="group" aria-label="时间线显示模式">
            <button type="button" data-mode="overlay">叠加模式</button>
            <button type="button" data-mode="strip">独立模式</button>
          </div>
          <button onclick="waveZoom(1/1.6)" title="缩小">−</button>
          <input type="range" id="zoomSlider" min="0" max="1000" value="0" title="缩放">
          <button onclick="waveZoom(1.6)" title="放大">+</button>
          <button onclick="waveZoomFit()" title="整段">⊡</button>
        </div>
      </div>
      <canvas id="rulerCanvas"></canvas>
      <div id="waveform">
        <div class="project-tracks" id="projectTracks"></div>
        <canvas id="waveCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="handoff-modal" id="distributionModal" hidden role="dialog" aria-modal="true" aria-labelledby="distributionTitle">
    <div class="handoff-card">
      <span class="handoff-kicker">/ EXPORT COMPLETE</span>
      <h2 id="distributionTitle">导出完成</h2>
      <p id="distributionSummary"></p>
      <label for="distributionPrompt">交给 AI 的提示词</label>
      <textarea id="distributionPrompt" readonly></textarea>
      <div class="handoff-actions">
        <button class="ghost" onclick="hideDistributionHandoff()">关闭</button>
        <button class="primary" id="copyDistributionBtn" onclick="copyDistributionHandoff()">复制提示词</button>
      </div>
    </div>
  </div>

  <script src="./review.js"></script>
</body>
</html>

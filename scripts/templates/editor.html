<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>素材编辑 / Multitrack</title>
  <link rel="stylesheet" href="./editor.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">剪<em>播客</em></div>
    <div class="actions">
      <div class="status" id="status">加载中...</div>
      <button class="icon-btn" id="importProjectBtn" title="导入项目 JSON" aria-label="导入项目 JSON"><i class="fa-solid fa-file-import"></i></button>
      <button class="icon-btn" id="exportProjectBtn" title="导出项目 JSON" aria-label="导出项目 JSON"><i class="fa-solid fa-file-export"></i></button>
      <button class="icon-btn" id="reviewBtn" title="回到审核页" aria-label="回到审核页"><i class="fa-solid fa-clipboard-check"></i></button>
      <button class="icon-btn warn" id="staleBtn" title="标记需要重新转文字和智能裁切" aria-label="标记需要重新转文字和智能裁切"><i class="fa-solid fa-rotate"></i></button>
      <button class="icon-btn primary" id="saveBtn" title="保存当前项目" aria-label="保存当前项目"><i class="fa-solid fa-floppy-disk"></i></button>
      <input id="projectImportInput" type="file" accept="application/json,.json" hidden>
    </div>
  </div>

  <main class="editor-grid">
    <section class="media-bin">
      <div class="panel-head">
        <div>
          <span class="kicker">/ ASSETS</span>
          <h2>素材库</h2>
        </div>
        <div class="head-actions">
          <button class="icon-btn primary" id="uploadAssetBtn" title="上传音频或视频到当前项目" aria-label="上传音频或视频到当前项目"><i class="fa-solid fa-upload"></i></button>
          <button class="icon-btn" id="removeSelectedAssetBtn" title="删除选中的素材及其片段" aria-label="删除选中的素材及其片段"><i class="fa-solid fa-trash"></i></button>
          <input id="uploadInput" type="file" accept="audio/*,video/*" multiple hidden>
        </div>
      </div>
      <div class="asset-list" id="assetList"></div>
    </section>

    <section class="viewer-panel">
      <div class="panel-head">
        <div>
          <span class="kicker">/ PROGRAM</span>
          <h2>节目监视器</h2>
        </div>
        <span class="preview-rule">最高视频轨显示画面 · 所有音频轨同步播放</span>
      </div>
      <div class="viewer">
        <video id="previewVideo" playsinline></video>
        <div class="viewer-empty" id="viewerEmpty">当前时间没有视频画面</div>
        <div class="viewer-timecode" id="viewerTimecode">00:00:00</div>
      </div>
      <div class="viewer-transport transport" aria-label="播放控制">
        <button class="icon-btn" id="jumpStartBtn" title="回到时间线开头" aria-label="回到时间线开头"><i class="fa-solid fa-backward-step"></i></button>
        <button class="icon-btn play-btn" id="playBtn" title="播放或暂停预览" aria-label="播放或暂停预览"><i class="fa-solid fa-play"></i></button>
        <button class="icon-btn" id="stopBtn" title="停止并回到开头" aria-label="停止并回到开头"><i class="fa-solid fa-stop"></i></button>
        <span class="time-display"><span id="timeCur">00:00</span><span>/</span><span id="timeTot">00:00</span></span>
      </div>
    </section>

    <div class="panel-resizer col-resizer" id="colResizer" title="拖动调整素材库宽度"></div>
    <div class="panel-resizer row-resizer" id="rowResizer" title="拖动调整上方面板高度"></div>

    <section class="timeline-panel">
      <aside class="inspector-panel">
        <div class="panel-head compact">
          <div>
            <span class="kicker">/ INSPECTOR</span>
            <h2>片段属性</h2>
          </div>
          <button class="icon-btn danger" id="deleteClipBtn" title="删除选中的片段" aria-label="删除选中的片段"><i class="fa-solid fa-trash-can"></i></button>
        </div>
        <div class="inspector-grid" id="inspector">
          <div class="empty-hint">在时间线上选择一个片段进行精调</div>
        </div>
      </aside>

      <div class="timeline-workspace">
        <div class="timeline-toolbar">
          <div class="timeline-title">
            <span class="kicker">/ TIMELINE</span>
            <button class="tool active" id="selectToolBtn" title="选择工具：移动和修剪片段" aria-label="选择工具"><i class="fa-solid fa-arrow-pointer"></i></button>
            <button class="tool" id="razorToolBtn" title="切割工具：在播放头处分割片段" aria-label="切割工具"><i class="fa-solid fa-scissors"></i></button>
            <button class="tool active" id="snapBtn" title="切换时间吸附" aria-label="切换时间吸附"><i class="fa-solid fa-magnet"></i></button>
            <button class="tool" id="addTrackBtn" title="新增一条轨道" aria-label="新增一条轨道"><i class="fa-solid fa-plus"></i></button>
            <button class="tool" id="deleteTrackBtn" title="删除最后一条空轨道" aria-label="删除最后一条空轨道"><i class="fa-solid fa-minus"></i></button>
          </div>
          <div class="zoom-group">
            <button class="icon-btn" id="zoomOutBtn" title="缩小时间线" aria-label="缩小时间线"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
            <input id="zoomSlider" type="range" min="0.05" max="120" step="0.05" value="34" aria-label="时间线缩放">
            <button class="icon-btn" id="zoomInBtn" title="放大时间线" aria-label="放大时间线"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            <button class="icon-btn" id="fitTimelineBtn" title="适配整段时间线" aria-label="适配整段时间线"><i class="fa-solid fa-expand"></i></button>
          </div>
        </div>
        <div class="timeline-body">
          <div class="timeline-scroll" id="timelineScroll">
            <div class="ruler" id="ruler"></div>
            <div class="tracks" id="tracks"></div>
            <div class="playhead" id="playhead"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./editor.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>素材编辑 / Multitrack</title>
  <link rel="stylesheet" href="./editor.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">剪<em>播客</em></div>
    <div class="transport">
      <button id="jumpStartBtn" title="回到开头">⏮</button>
      <button class="play-btn" id="playBtn">▶ 播放</button>
      <button id="stopBtn" title="停止">■</button>
      <span class="time-display"><span id="timeCur">00:00</span><span>/</span><span id="timeTot">00:00</span></span>
    </div>
    <div class="actions">
      <div class="status" id="status">加载中...</div>
      <button id="reviewBtn">回到审核</button>
      <button class="warn" id="staleBtn">标记需重转文字</button>
      <button class="primary" id="saveBtn">保存项目</button>
    </div>
  </div>

  <main class="editor-grid">
    <section class="media-bin">
      <div class="panel-head">
        <div>
          <span class="kicker">/ ASSETS</span>
          <h2>素材库</h2>
        </div>
        <div class="head-actions">
          <button id="uploadAssetBtn" title="上传到当前项目媒体目录">上传</button>
          <button class="primary" id="openAssetModalBtn">导入路径</button>
          <input id="uploadInput" type="file" accept="audio/*,video/*" multiple hidden>
        </div>
      </div>
      <div class="asset-list" id="assetList"></div>
    </section>

    <section class="viewer-panel">
      <div class="panel-head">
        <div>
          <span class="kicker">/ PROGRAM</span>
          <h2>预览</h2>
        </div>
        <span class="preview-rule">视频取当前最上方视频轨 · 音频轨全部播放</span>
      </div>
      <div class="viewer">
        <video id="previewVideo" playsinline></video>
        <div class="viewer-empty" id="viewerEmpty">当前时间没有视频画面</div>
        <div class="viewer-timecode" id="viewerTimecode">00:00:00</div>
      </div>
    </section>

    <div class="panel-resizer col-resizer" id="colResizer" title="拖动调整素材库宽度"></div>
    <div class="panel-resizer row-resizer" id="rowResizer" title="拖动调整上方面板高度"></div>

    <section class="inspector-panel">
      <div class="panel-head compact">
        <div>
          <span class="kicker">/ INSPECTOR</span>
          <h2>片段属性</h2>
        </div>
        <button id="deleteClipBtn">删除片段</button>
      </div>
      <div class="notice" id="staleNotice">项目已修改。回到审核页后，可以选择重新转文字和智能裁切，或继续沿用当前审核选择。</div>
      <div class="inspector-grid" id="inspector">
        <div class="empty-hint">在时间线上选择一个片段进行精调</div>
      </div>
    </section>

    <section class="timeline-panel">
      <div class="timeline-toolbar">
        <div class="timeline-title">
          <span class="kicker">/ TIMELINE</span>
          <button class="tool active" id="selectToolBtn" title="选择工具">↖</button>
          <button class="tool" id="razorToolBtn" title="切割工具（占位）">⌇</button>
          <button class="tool" id="snapBtn" title="吸附开关">磁吸</button>
        </div>
        <div class="zoom-group">
          <button id="zoomOutBtn">−</button>
          <input id="zoomSlider" type="range" min="1" max="90" value="34">
          <button id="zoomInBtn">+</button>
          <button id="fitTimelineBtn">适配</button>
        </div>
      </div>
      <div class="timeline-body">
        <div class="track-tools">
          <button class="tool active" title="轨道选择">V</button>
          <button class="tool" title="音频轨">A</button>
          <button class="tool" title="锁定占位">🔒</button>
        </div>
        <div class="timeline-scroll" id="timelineScroll">
          <div class="ruler" id="ruler"></div>
          <div class="tracks" id="tracks"></div>
          <div class="playhead" id="playhead"></div>
        </div>
      </div>
    </section>
  </main>

  <dialog id="assetModal">
    <form method="dialog" class="modal-card">
      <div class="panel-head">
        <div>
          <span class="kicker">/ IMPORT PATH</span>
          <h2>通过路径导入素材</h2>
        </div>
        <button value="cancel">关闭</button>
      </div>
      <label for="assetPath">本机素材绝对路径</label>
      <input id="assetPath" placeholder="/Users/.../host.m4a">
      <div class="two-col">
        <div>
          <label for="assetName">名称</label>
          <input id="assetName" placeholder="Host Mic">
        </div>
        <div>
          <label for="assetKind">类型</label>
          <select id="assetKind">
            <option value="audio">音频</option>
            <option value="video">视频</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button value="cancel">取消</button>
        <button class="primary" id="addAssetBtn" value="default">添加</button>
      </div>
    </form>
  </dialog>

  <script src="./editor.js"></script>
</body>
</html>
